<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Weather App</h1>
</header>

<nav>
    <a href="index.html">← Back to Portfolio</a>
</nav>

<main>

    <p>Click the button to get live weather data (Kuopio).</p>

    <button id="btnKuopio">Get Weather</button>

    <div id="weatherBox">

        <p>
            <strong>City:</strong>
            <span id="city">-</span>
        </p>

        <p>
            <strong>Temperature:</strong>
            <span id="temperature">-</span>
        </p>

        <p>
            <strong>Wind Speed:</strong>
            <span id="wind">-</span>
        </p>

        <!-- 🌤 WEATHER ICON -->
        <p>
            <strong>Weather:</strong>
            <span id="icon">-</span>
        </p>

    </div>

</main>

<script src="weather.js"></script>

</body>
</html>
